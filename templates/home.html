{% extends "base.html" %}
{% block content %}

<div class="flex flex-col items-center justify-center mt-16">
    <h1 class="text-4xl font-bold text-gray-800 mb-2">Encontre seu alimento</h1>
    <p class="text-gray-500 mb-8">Pesquise por nome, marca ou ingrediente</p>

    <div class="w-full max-w-xl flex gap-2">
        <input
            id="search-input"
            type="text"
            name="query"
            placeholder="Ex: coca cola, whey protein, arroz..."
            class="flex-1 border border-gray-300 rounded-xl px-5 py-3 text-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400"
        />
        <button
            class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl text-lg font-semibold shadow-sm transition-all"
            hx-get="/search"
            hx-include="#search-input"
            hx-target="#results"
            hx-indicator="#loading"
        >
            Buscar
        </button>
    </div>

    <span id="loading" class="htmx-indicator text-gray-400 mt-4">Buscando...</span>

    <div id="results" class="w-full max-w-xl mt-6"></div>
</div>

{% endblock %}
