{% if products %}
    <ul class="flex flex-col gap-3">
        {% for product in products %}
            {% if product.product_name %}
            <li>
                <a href="/product/{{ product.code }}"
                   class="flex items-center gap-4 bg-white border border-gray-200 rounded-xl px-4 py-3 shadow-sm hover:shadow-md hover:border-green-400 transition-all">

                    <img
                        src="{{ product.image_url or 'https://placehold.co/60x60?text=?' }}"
                        alt="{{ product.product_name }}"
                        class="w-14 h-14 object-contain rounded-lg"
                    />

                    <div>
                        <p class="font-semibold text-gray-800">{{ product.product_name }}</p>
                        <p class="text-sm text-gray-400">{{ product.brands or "Marca não informada" }}</p>
                    </div>

                </a>
            </li>
            {% endif %}
        {% endfor %}
    </ul>
{% else %}
    <p class="text-center text-gray-400">Nenhum produto encontrado.</p>
{% endif %}
