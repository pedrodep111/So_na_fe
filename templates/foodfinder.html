<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0FDF4;
      --surface: #FFFFFF;
      --surface2: #DCFCE7;
      --ink: #14532D;
      --ink2: #166534;
      --ink3: #4ADE80;
      --accent: #16A34A;
      --accent2: #15803D;
      --border: #BBF7D0;
      --border2: #86EFAC;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --r: 12px;
      --r-sm: 6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #052e16;
        --surface: #14532d;
        --surface2: #166534;
        --ink: #f0fdf4;
        --ink2: #bbf7d0;
        --ink3: #86efac;
        --accent: #22c55e;
        --accent2: #16a34a;
        --border: #166534;
        --border2: #15803d;
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* Layout */
    .wrap { max-width: 860px; margin: 0 auto; padding: 0 1.5rem; }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 1rem;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-bottom: 2px;
    }

    /* Search bar */
    .search-form {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 480px;
    }
    .search-input-wrap {
      flex: 1;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--ink3);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      height: 38px;
      padding: 0 12px 0 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input::placeholder { color: var(--ink3); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
      background: var(--surface);
    }
    .search-btn {
      height: 38px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .search-btn:hover { opacity: 0.9; }
    .search-btn:active { transform: scale(0.97); }

    /* Main */
    main { padding: 2.5rem 0 4rem; }

    /* Hero (empty state) */
    .hero {
      text-align: center;
      padding: 4rem 1rem;
      animation: fadeUp 0.5s ease both;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--ink);
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    .hero-title em {
      font-style: italic;
      color: var(--accent);
    }
    .hero-sub {
      font-size: 15px;
      color: var(--ink2);
      max-width: 420px;
      margin: 0 auto 2.5rem;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .suggestion-chip {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 13px;
      color: var(--ink2);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-body);
    }
    .suggestion-chip:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Results header */
    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.3s ease both;
    }
    .results-title {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--ink);
    }
    .results-count {
      font-size: 13px;
      color: var(--ink3);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .card-img-wrap {
      height: 150px;
      background: var(--surface2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .card:hover .card-img-wrap img { transform: scale(1.04); }
    .card-img-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--ink3);
    }
    .card-img-placeholder svg { opacity: 0.4; }
    .card-body { padding: 12px 14px 14px; }
    .card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-brand {
      font-size: 12px;
      color: var(--ink3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }

    /* Nutri-score badges */
    .ns {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .ns-a { background: #1B8C3E; color: #C6EED3; }
    .ns-b { background: #5A9E28; color: #D4EEC0; }
    .ns-c { background: #D4A017; color: #FFF3CC; }
    .ns-d { background: #D46A17; color: #FFE4CC; }
    .ns-e { background: #C83020; color: #FFD4CE; }

    /* Spinner */
    .spinner-wrap {
      text-align: center;
      padding: 4rem 1rem;
      animation: fadeUp 0.3s ease both;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2.5px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 12px;
    }
    .spinner-wrap p { font-size: 14px; color: var(--ink3); }

    /* Empty/Error */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      animation: fadeUp 0.4s ease both;
    }
    .empty-state svg { opacity: 0.25; margin-bottom: 16px; }
    .empty-state h3 { font-family: var(--font-display); font-size: 20px; margin-bottom: 6px; }
    .empty-state p { font-size: 14px; color: var(--ink2); }

    /* Detail */
    #detail { display: none; }
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--ink2);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 1.5rem;
      font-family: var(--font-body);
      transition: color 0.15s;
    }
    .detail-back:hover { color: var(--accent); }
    .detail-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 2rem;
      align-items: start;
    }
    .detail-img-box {
      border-radius: var(--r);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface2);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-img-box img { width: 100%; height: 100%; object-fit: cover; }
    .detail-img-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--ink3);
    }

    .detail-name {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 3vw, 2rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .detail-brand {
      font-size: 14px;
      color: var(--ink2);
      margin-bottom: 12px;
    }
    .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }

    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nutri-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .nutri-card {
      background: var(--surface2);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      border: 1px solid var(--border);
    }
    .nutri-label { font-size: 11px; color: var(--ink3); margin-bottom: 3px; }
    .nutri-val { font-size: 16px; font-weight: 500; color: var(--ink); }

    .ingredients-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      font-size: 13px;
      color: var(--ink2);
      line-height: 1.7;
    }

    .qty-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 12px;
      color: var(--ink2);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--ink);
      color: var(--bg);
      padding: 8px 16px;
      border-radius: var(--r-sm);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Responsive */
    @media (max-width: 640px) {
      .detail-layout { grid-template-columns: 1fr; }
      .detail-img-box { max-width: 200px; }
      .header-inner { gap: 8px; }
      .search-form { max-width: 100%; }
    }
    @media (max-width: 480px) {
      .logo span { display: none; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap header-inner">
      <a href="/" class="logo">
        <span class="logo-dot"></span>
        <span>FoodFinder</span>
      </a>
      <form class="search-form" onsubmit="handleSearch(event)">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/>
          </svg>
          <input type="search" id="q" class="search-input" placeholder="Buscar alimento... ex: chocolate, arroz" autocomplete="off">
        </div>
        <button type="submit" class="search-btn">Buscar</button>
      </form>
    </div>
  </header>

  <main>
    <div class="wrap">

      <!-- Home -->
      <div id="home">
        <div id="home-content">
          <div class="hero">
            <h1 class="hero-title">Conheça o que você<br><em>está comendo</em></h1>
            <p class="hero-sub">Informações nutricionais detalhadas de milhares de produtos do mundo todo.</p>
            <div class="suggestions">
              <button class="suggestion-chip" onclick="quickSearch('chocolate')">Chocolate</button>
              <button class="suggestion-chip" onclick="quickSearch('arroz')">Arroz</button>
              <button class="suggestion-chip" onclick="quickSearch('iogurte')">Iogurte</button>
              <button class="suggestion-chip" onclick="quickSearch('pizza')">Pizza</button>
              <button class="suggestion-chip" onclick="quickSearch('aveia')">Aveia</button>
              <button class="suggestion-chip" onclick="quickSearch('macarrão')">Macarrão</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Detail -->
      <div id="detail"></div>

    </div>
  </main>

  <div id="toast"></div>

<script>
  // ─── Rotas do backend Flask ───────────────────────────────────────────────
  // /search?query=<termo>       → retorna lista de produtos (JSON)
  // /product/<barcode>          → retorna detalhes do produto (JSON)
  // Os campos de nutrientes seguem o padrão do Open Food Facts via api.py:
  //   energy-kcal_100g, fat_100g, saturated-fat_100g, carbohydrates_100g,
  //   sugars_100g, fiber_100g, proteins_100g, salt_100g, sodium_100g

  let cachedResults = [];

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function handleSearch(e) {
    e.preventDefault();
    const q = document.getElementById('q').value.trim();
    if (!q) { toast('Digite o nome de um alimento'); return; }
    doSearch(q);
  }

  function quickSearch(term) {
    document.getElementById('q').value = term;
    doSearch(term);
  }

  function setHomeContent(html) {
    document.getElementById('home-content').innerHTML = html;
  }

  function spinner(msg) {
    return `<div class="spinner-wrap"><div class="spinner"></div><p>${msg||'Buscando...'}</p></div>`;
  }

  function nsHTML(g) {
    if (!g) return '';
    const labels = {a:'A',b:'B',c:'C',d:'D',e:'E'};
    return `<span class="ns ns-${g.toLowerCase()}">Nutri-Score ${labels[g.toLowerCase()]||g.toUpperCase()}</span>`;
  }

  function cardImgHTML(url, name) {
    if (url) return `<img src="${url}" alt="${name||''}" loading="lazy" onerror="this.parentElement.innerHTML=imgPlaceholder()">`;
    return imgPlaceholder();
  }

  function imgPlaceholder() {
    return `<div class="card-img-placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3l18 18M10.5 6h7a2 2 0 012 2v7m-2 4H5a2 2 0 01-2-2V8a2 2 0 012-2h1.5"/></svg>
    </div>`;
  }

  async function doSearch(q) {
    showHome();
    setHomeContent(spinner('Buscando produtos...'));
    try {
      // Chama a rota /search do Flask (app.py → search_products no api.py)
      const r = await fetch(`/search?query=${encodeURIComponent(q)}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const products = await r.json();
      cachedResults = products || [];
      if (!cachedResults.length) {
        setHomeContent(`<div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <h3>Nenhum produto encontrado</h3>
          <p>Tente buscar por outro alimento</p>
        </div>`);
        return;
      }
      const cards = cachedResults.map((p, i) => {
        const delay = Math.min(i * 30, 300);
        return `<div class="card" style="animation-delay:${delay}ms" onclick="openDetail('${p.code}')">
          <div class="card-img-wrap">${cardImgHTML(p.image_small_url||p.image_url, p.product_name)}</div>
          <div class="card-body">
            <div class="card-name">${p.product_name||'Produto sem nome'}</div>
            <div class="card-brand">${p.brands||'Marca desconhecida'}</div>
            ${nsHTML(p.nutriscore_grade)}
          </div>
        </div>`;
      }).join('');
      setHomeContent(`
        <div class="results-header">
          <h2 class="results-title">Resultados para "<em>${q}</em>"</h2>
          <span class="results-count">${cachedResults.length} produtos</span>
        </div>
        <div class="grid">${cards}</div>
      `);
    } catch(e) {
      setHomeContent(`<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        <h3>Erro de conexão</h3>
        <p>Verifique sua internet e tente novamente</p>
      </div>`);
    }
  }

  async function openDetail(code) {
    showDetail();
    document.getElementById('detail').innerHTML = `
      <button class="detail-back" onclick="backToHome()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Voltar aos resultados
      </button>
      ${spinner('Carregando produto...')}`;
    window.scrollTo({top:0, behavior:'smooth'});
    try {
      // Chama a rota /product/<barcode> do Flask (app.py → get_product no api.py)
      const r = await fetch(`/product/${code}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const p = await r.json();
      if (!p || Object.keys(p).length === 0) throw new Error('Produto vazio');
      renderDetail(p);
    } catch(e) {
      document.getElementById('detail').innerHTML = `
        <button class="detail-back" onclick="backToHome()">← Voltar</button>
        <div class="empty-state"><h3>Produto não encontrado</h3><p>Tente outro item</p></div>`;
    }
  }

  function renderDetail(p) {
    // Os campos de nutrientes vêm no formato do Open Food Facts via api.py:
    // nutriments['energy-kcal_100g'], nutriments['fat_100g'], etc.
    const n = p.nutriments || {};

    const imgHTML = p.image_url
      ? `<img src="${p.image_url}" alt="${p.product_name||''}" onerror="this.style.display='none'">`
      : `<div class="detail-img-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="13.5" r="1.5"/></svg></div>`;

    const rows = [
      ['Energia',          n['energy-kcal_100g'] != null ? `${Math.round(n['energy-kcal_100g'])} kcal` : null],
      ['Gorduras totais',  n['fat_100g']          != null ? `${n['fat_100g']}g`          : null],
      ['G. saturadas',     n['saturated-fat_100g']!= null ? `${n['saturated-fat_100g']}g`: null],
      ['Carboidratos',     n['carbohydrates_100g']!= null ? `${n['carbohydrates_100g']}g`: null],
      ['Açúcares',         n['sugars_100g']        != null ? `${n['sugars_100g']}g`        : null],
      ['Fibras',           n['fiber_100g']         != null ? `${n['fiber_100g']}g`         : null],
      ['Proteínas',        n['proteins_100g']      != null ? `${n['proteins_100g']}g`      : null],
      ['Sal',              n['salt_100g']           != null ? `${n['salt_100g']}g`           : null],
      ['Sódio',            n['sodium_100g']         != null ? `${n['sodium_100g']}g`         : null],
    ].filter(r => r[1]);

    const nutriHTML = rows.length
      ? rows.map(r => `<div class="nutri-card"><div class="nutri-label">${r[0]}</div><div class="nutri-val">${r[1]}</div></div>`).join('')
      : '<p style="font-size:13px;color:var(--ink3)">Informações não disponíveis</p>';

    document.getElementById('detail').innerHTML = `
      <button class="detail-back" onclick="backToHome()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Voltar aos resultados
      </button>
      <div class="detail-layout" style="animation: fadeUp 0.4s ease both">
        <div>
          <div class="detail-img-box">${imgHTML}</div>
        </div>
        <div>
          <h1 class="detail-name">${p.product_name||'Produto sem nome'}</h1>
          ${p.brands ? `<div class="detail-brand">${p.brands}</div>` : ''}
          <div class="detail-meta">
            ${nsHTML(p.nutriscore_grade)}
            ${p.quantity ? `<span class="qty-tag">${p.quantity}</span>` : ''}
          </div>
          <div class="divider"></div>
          <div class="section-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Tabela nutricional (por 100g)
          </div>
          <div class="nutri-grid">${nutriHTML}</div>
          ${p.ingredients_text ? `
            <div class="divider"></div>
            <div class="section-label">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              Ingredientes
            </div>
            <div class="ingredients-box">${p.ingredients_text}</div>
          ` : ''}
          ${p.generic_name ? `
            <div class="divider"></div>
            <div class="section-label">Descrição</div>
            <div class="ingredients-box">${p.generic_name}</div>
          ` : ''}
        </div>
      </div>`;
  }

  function showHome() {
    document.getElementById('home').style.display = 'block';
    document.getElementById('detail').style.display = 'none';
  }

  function showDetail() {
    document.getElementById('home').style.display = 'none';
    document.getElementById('detail').style.display = 'block';
  }

  function backToHome() {
    showHome();
    document.getElementById('detail').innerHTML = '';
    window.scrollTo({top:0, behavior:'smooth'});
  }
</script>
</body>
</html>
